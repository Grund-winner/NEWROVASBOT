<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ROVAS · Statistiques</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000a14;--bg2:#001020;
  --accent:#00c8ff;--accent-dk:#0099cc;--accent-lt:#66e0ff;
  --green:#00e676;--red:#ff5252;--orange:#ff9500;
  --text:#fff;--muted:#5a7a8f;
  --glass:rgba(0,200,255,0.06);--glass-b:rgba(0,200,255,0.10);
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;
}
html,body{
  height:100%;font-family:var(--font);
  background:var(--bg);color:var(--text);
  overflow-x:hidden;-webkit-tap-highlight-color:transparent;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 600px 400px at 20% 20%,rgba(0,200,255,0.035),transparent),
    radial-gradient(ellipse 500px 500px at 80% 75%,rgba(0,200,255,0.025),transparent);
}

/* ── PAGE ── */
.page{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:0 16px 100px}

/* ── HEADER ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0 22px;
}
.header-left{display:flex;align-items:center;gap:12px}
.back-btn{
  width:36px;height:36px;border-radius:10px;border:none;
  background:var(--glass);border:1px solid var(--glass-b);
  color:var(--accent);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .15s;
}
.back-btn:active{opacity:.6}
.back-btn svg{width:18px;height:18px}
.header-titles{}
.header-titles h1{
  font-size:.92rem;font-weight:700;color:var(--text);
  letter-spacing:-.2px;
}
.header-titles span{
  font-size:.62rem;color:var(--muted);font-weight:600;
  letter-spacing:1px;text-transform:uppercase;
}
.header-date{
  font-size:.7rem;color:var(--muted);font-weight:600;
  background:var(--glass);border:1px solid var(--glass-b);
  padding:6px 10px;border-radius:8px;
}

/* ── SECTION ── */
.section{margin-bottom:22px}
.section-label{
  font-size:.68rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:1.5px;
  margin-bottom:10px;padding-left:2px;
}

/* ── METRICS ROW ── */
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.metric{
  background:linear-gradient(145deg,rgba(0,200,255,0.04),rgba(0,16,32,0.7));
  border:1px solid var(--glass-b);border-radius:14px;
  padding:14px 10px;text-align:center;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.metric-icon{
  width:32px;height:32px;border-radius:8px;margin:0 auto 8px;
  display:flex;align-items:center;justify-content:center;
}
.metric-icon svg{width:18px;height:18px}
.metric-icon.cyan{background:rgba(0,200,255,0.10);color:var(--accent)}
.metric-icon.green{background:rgba(0,230,118,0.10);color:var(--green)}
.metric-icon.orange{background:rgba(255,149,0,0.10);color:var(--orange)}
.metric-value{font-size:1.15rem;font-weight:800;color:#fff;line-height:1.1}
.metric-label{
  font-size:.58rem;color:var(--muted);margin-top:4px;
  text-transform:uppercase;letter-spacing:.4px;font-weight:600;
}

/* ── TOP GAME CARD ── */
.top-card{
  background:linear-gradient(145deg,rgba(0,200,255,0.05),rgba(0,16,32,0.8));
  border:1px solid var(--glass-b);border-radius:16px;
  padding:14px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;gap:14px;
}
.top-game-img{
  width:56px;height:56px;border-radius:12px;
  object-fit:cover;
  border:1px solid rgba(0,200,255,0.15);
  flex-shrink:0;background:var(--bg2);
}
.top-game-info{flex:1;min-width:0}
.top-game-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:.56rem;font-weight:700;color:var(--accent);
  text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:4px;
}
.top-game-badge svg{width:12px;height:12px}
.top-game-name{font-size:.88rem;font-weight:700;color:#fff}
.top-game-stats{display:flex;gap:14px;margin-top:6px}
.top-game-stat-value{font-size:.78rem;font-weight:700;color:var(--green)}
.top-game-stat-label{font-size:.54rem;color:var(--muted);text-transform:uppercase}

/* ── MINI CHART ── */
.chart-card{
  background:linear-gradient(145deg,rgba(0,200,255,0.04),rgba(0,16,32,0.7));
  border:1px solid var(--glass-b);border-radius:14px;
  padding:14px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.chart-title{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.chart-value{font-size:.72rem;font-weight:700;color:var(--accent)}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:80px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.chart-bar{
  width:100%;border-radius:4px 4px 2px 2px;
  background:linear-gradient(180deg,var(--accent),var(--accent-dk));
  min-height:4px;transition:height 1s cubic-bezier(.4,0,.2,1);
}
.chart-bar.empty{background:rgba(0,200,255,0.08)}
.chart-bar-label{font-size:.52rem;color:var(--muted);font-weight:600}

/* ── HISTORY LIST ── */
.history-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;
  background:linear-gradient(145deg,rgba(0,200,255,0.03),rgba(0,16,32,0.5));
  border:1px solid rgba(0,200,255,0.06);border-radius:12px;
  margin-bottom:6px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.history-date-col{width:68px;flex-shrink:0}
.history-day{font-size:.82rem;font-weight:700;color:#fff;line-height:1.2}
.history-month{font-size:.56rem;color:var(--muted);font-weight:600}
.history-vals{flex:1;display:flex;gap:6px}
.history-val{
  flex:1;text-align:center;
  padding:4px 0;border-radius:8px;
  background:rgba(0,200,255,0.03);
}
.history-val-num{font-size:.72rem;font-weight:700;color:#fff;line-height:1.2}
.history-val-num.g{color:var(--green)}
.history-val-lbl{font-size:.48rem;color:var(--muted);text-transform:uppercase;letter-spacing:.2px;margin-top:1px}
.history-game{
  width:44px;height:44px;border-radius:10px;flex-shrink:0;
  object-fit:cover;border:1px solid rgba(0,200,255,0.1);
  background:var(--bg2);
}

/* ── ANIM ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .45s cubic-bezier(.34,1.56,.64,1) both}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,200,255,0.12);border-radius:2px}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state svg{width:40px;height:40px;opacity:.3;margin-bottom:12px}
.empty-state p{font-size:.8rem}
</style>
</head>
<body>

<div class="page">

  <!-- HEADER -->
  <div class="header anim" style="animation-delay:0s">
    <div class="header-left">
      <button class="back-btn" onclick="window.history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="header-titles">
        <h1>Statistiques</h1>
        <span>Performances quotidiennes</span>
      </div>
    </div>
    <div class="header-date" id="headerDate">...</div>
  </div>

  <!-- LATEST METRICS -->
  <div class="section anim" style="animation-delay:.06s">
    <div class="section-label" id="metricsLabel">Dernieres donnees</div>
    <div class="metrics" id="metricsRow">
      <div class="metric">
        <div class="metric-icon cyan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        </div>
        <div class="metric-value" id="mPlayers">--</div>
        <div class="metric-label">Joueurs</div>
      </div>
      <div class="metric">
        <div class="metric-icon orange">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <div class="metric-value" id="mBets">--</div>
        <div class="metric-label">Mises</div>
      </div>
      <div class="metric">
        <div class="metric-icon green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <div class="metric-value" id="mWinnings">--</div>
        <div class="metric-label">Gains</div>
      </div>
    </div>
  </div>

  <!-- TOP GAME -->
  <div class="section anim" style="animation-delay:.12s" id="topGameSection">
    <div class="section-label">Meilleur jeu du jour</div>
    <div class="top-card" id="topGameCard">
      <img class="top-game-img" id="topGameImg" src="" alt="">
      <div class="top-game-info">
        <div class="top-game-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Top performance
        </div>
        <div class="top-game-name" id="topGameName">...</div>
        <div class="top-game-stats">
          <div>
            <div class="top-game-stat-value" id="topGamePlayers">--</div>
            <div class="top-game-stat-label">Joueurs</div>
          </div>
          <div>
            <div class="top-game-stat-value" id="topGameWinnings">--</div>
            <div class="top-game-stat-label">Gains</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- CHART -->
  <div class="section anim" style="animation-delay:.18s" id="chartSection">
    <div class="section-label">Tendance gains (7j)</div>
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">Gains quotidiens</span>
        <span class="chart-value" id="chartAvg">Moy: --</span>
      </div>
      <div class="chart-bars" id="chartBars"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="section anim" style="animation-delay:.24s" id="historySection">
    <div class="section-label">Historique</div>
    <div id="historyList"></div>
  </div>

</div>

<script>
(function(){
  var API = '/api/games?action=stats';
  var GAME_IMAGES = {
    'astronaut':'/games/astronaut.avif',
    'chicken-road':'/games/chichen_run.avif',
    'chicken_road':'/games/chichen_run.avif',
    'crash':'/games/crash.avif',
    'crime-empire':'/games/crime_empire.avif',
    'fortune':'/games/fortune_crash.avif',
    'foxjob':'/games/fox.avif',
    'GOALL':'/games/goal.avif',
    'luckjet':'/games/lucky.avif',
    'metacrash':'/games/meta.avif',
    'rocketqueen':'/games/rocky.avif',
    'rocketx':'/games/rocktx.avif',
    'topiciana':'/games/tropicana.avif'
  };

  function getGameImg(slug){
    return GAME_IMAGES[slug] || '/games/crash.avif';
  }

  function fmt$(n){
    if(n>=1000) return '$'+(n/1000).toFixed(1)+'K';
    return '$'+n.toLocaleString();
  }
  function fmtDate(iso){
    var d=new Date(iso+'T00:00:00');
    var days=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    var months=['Jan','Fev','Mar','Avr','Mai','Jun','Jul','Aou','Sep','Oct','Nov','Dec'];
    return{day:d.getDate(),dayName:days[d.getDay()],month:months[d.getMonth()]};
  }

  function render(data){
    if(!data||!data.history||data.history.length===0){
      document.getElementById('metricsLabel').textContent='Aucune donnee';
      document.getElementById('historyList').innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path d="M9 12h6"/></svg><p>Aucune statistique disponible</p></div>';
      document.getElementById('topGameSection').style.display='none';
      document.getElementById('chartSection').style.display='none';
      return;
    }

    var latest=data.history[0];
    var rest=data.history.slice(1);

    // Header date
    var fd=fmtDate(latest.stat_date);
    document.getElementById('headerDate').textContent=fd.dayName+' '+fd.day+' '+fd.month;

    // Metrics
    document.getElementById('mPlayers').textContent=latest.total_players;
    document.getElementById('mBets').textContent=fmt$(latest.total_bets);
    document.getElementById('mWinnings').textContent=fmt$(latest.total_winnings);

    // Top game
    if(latest.top_game_slug){
      document.getElementById('topGameSection').style.display='';
      document.getElementById('topGameImg').src=getGameImg(latest.top_game_slug);
      document.getElementById('topGameName').textContent=latest.top_game_name||latest.top_game_slug;
      document.getElementById('topGamePlayers').textContent=latest.top_game_players||'--';
      document.getElementById('topGameWinnings').textContent=fmt$(latest.top_game_winnings||0);
    } else {
      document.getElementById('topGameSection').style.display='none';
    }

    // Chart (last 7 from history)
    var chartData=data.history.slice(0,7).reverse();
    var maxW=Math.max.apply(null,chartData.map(function(c){return c.total_winnings||1}));
    var barsHtml='';
    var sum=0;
    for(var i=0;i<chartData.length;i++){
      var c=chartData[i];
      var pct=((c.total_winnings||0)/maxW)*100;
      var d=fmtDate(c.stat_date);
      sum+=c.total_winnings||0;
      barsHtml+='<div class="chart-bar-wrap"><div class="chart-bar'+(pct<5?' empty':'')+'" style="height:'+Math.max(pct,4)+'%"></div><span class="chart-bar-label">'+d.day+'</span></div>';
    }
    document.getElementById('chartBars').innerHTML=barsHtml;
    document.getElementById('chartAvg').textContent='Moy: '+fmt$(Math.round(sum/chartData.length));

    // Animate bars
    setTimeout(function(){
      var bars=document.querySelectorAll('.chart-bar');
      for(var j=0;j<bars.length;j++){
        bars[j].style.height=bars[j].style.height;
      }
    },100);

    // History
    var histHtml='';
    var histData=rest.slice(0,15);
    for(var k=0;k<histData.length;k++){
      var h=histData[k];
      var hd=fmtDate(h.stat_date);
      histHtml+='<div class="history-item">'+
        '<div class="history-date-col"><div class="history-day">'+hd.day+'</div><div class="history-month">'+hd.month+'</div></div>'+
        '<div class="history-vals">'+
          '<div class="history-val"><div class="history-val-num">'+h.total_players+'</div><div class="history-val-lbl">Joueurs</div></div>'+
          '<div class="history-val"><div class="history-val-num">'+fmt$(h.total_bets)+'</div><div class="history-val-lbl">Mises</div></div>'+
          '<div class="history-val"><div class="history-val-num g">'+fmt$(h.total_winnings)+'</div><div class="history-val-lbl">Gains</div></div>'+
        '</div>'+
        (h.top_game_slug?'<img class="history-game" src="'+getGameImg(h.top_game_slug)+'" alt="">':'')+
      '</div>';
    }
    document.getElementById('historyList').innerHTML=histHtml||'<div class="empty-state"><p>Aucun historique</p></div>';
  }

  // Load from API
  fetch(API,{cache:'no-store'})
    .then(function(r){return r.json()})
    .then(function(data){
      if(data.success&&data.history){
        render(data);
      } else {
        render(null);
      }
    })
    .catch(function(){
      render(null);
    });
})();
</script>
</body>
</html>
