<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ROVAS · 1win Prediction</title>
<link rel="icon" href="/identite_visuel.jpg">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html,body{touch-action:pan-x pan-y!important;overscroll-behavior:none}

:root{
  --dvys-bg-primary:#0a1628;
  --dvys-bg-secondary:#0f1f3a;
  --dvys-accent:#38bdf8;
  --dvys-accent-dark:#0284c7;
  --dvys-accent-light:#7dd3fc;
  --dvys-glass:rgba(56,189,248,0.08);
  --dvys-glass-border:rgba(56,189,248,0.15);
  --dvys-text:#f0f9ff;
  --dvys-text-muted:#7b93ab;
  --dvys-green:#34d399;
  --dvys-red:#f87171;
  --dvys-orange:#fbbf24;
}

body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--dvys-bg-primary);
  color:var(--dvys-text);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

/* Animated BG */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 10%,rgba(56,189,248,0.06) 0%,transparent 70%),
    radial-gradient(ellipse 500px 500px at 80% 90%,rgba(56,189,248,0.04) 0%,transparent 70%),
    radial-gradient(ellipse 300px 300px at 50% 50%,rgba(56,189,248,0.02) 0%,transparent 70%);
  animation:dvys-bgDrift 25s ease-in-out infinite alternate;
  pointer-events:none;z-index:0;
}
@keyframes dvys-bgDrift{
  0%{transform:translate(0,0) scale(1)}
  100%{transform:translate(20px,-15px) scale(1.05)}
}

/* Floating coins */
.coin-particle{
  position:fixed;
  font-size:16px;
  pointer-events:none;
  z-index:0;
  opacity:0;
  animation:coinFloat linear infinite;
}
@keyframes coinFloat{
  0%{transform:translateY(110vh) rotate(0deg);opacity:0}
  10%{opacity:0.35}
  90%{opacity:0.35}
  100%{transform:translateY(-10vh) rotate(720deg);opacity:0}
}

/* HEADER */
.dvys-header{
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  background:rgba(10,22,40,0.8);
  border-bottom:1px solid rgba(56,189,248,0.08);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  animation:dvys-slideDown 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes dvys-slideDown{
  from{opacity:0;transform:translateY(-100%)}
  to{opacity:1;transform:translateY(0)}
}

.dvys-header-left{display:flex;align-items:center;gap:12px}
.dvys-logo-img{width:36px;height:36px;border-radius:10px;object-fit:cover;border:2px solid rgba(56,189,248,0.25);}
.dvys-header-brand{display:flex;flex-direction:column}
.dvys-brand-name{
  font-size:1.15rem;font-weight:900;
  background:linear-gradient(135deg,var(--dvys-accent-light),var(--dvys-accent),var(--dvys-accent-dark));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:1px;line-height:1.2;
}
.dvys-brand-sub{font-size:0.6rem;color:var(--dvys-text-muted);font-weight:600;letter-spacing:2px;text-transform:uppercase}

.dvys-header-right{display:flex;align-items:center;gap:12px}
.dvys-info-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.15);
  color:var(--dvys-accent);font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.3s;
}
.dvys-info-btn:hover{background:rgba(56,189,248,0.15);border-color:rgba(56,189,248,0.3)}

/* HERO */
.dvys-hero{
  text-align:center;
  padding:40px 20px 30px;
  position:relative;z-index:1;
  animation:dvys-fadeInUp 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
}
.dvys-hero h1{
  font-size:1.8rem;font-weight:900;
  background:linear-gradient(135deg,var(--dvys-accent-light),var(--dvys-accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:6px;letter-spacing:0.5px;
}
.dvys-hero p{font-size:0.85rem;color:var(--dvys-text-muted);font-weight:500}

/* LOADING */
.dvys-loading{
  position:relative;z-index:1;
  text-align:center;
  padding:60px 20px;
}
.dvys-loading-spinner{
  width:40px;height:40px;
  border:3px solid rgba(56,189,248,0.15);
  border-top-color:var(--dvys-accent);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* GAME GRID */
.dvys-grid{
  position:relative;z-index:1;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
  padding:0 16px 100px;
  max-width:500px;
  margin:0 auto;
}

@keyframes dvys-fadeInUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.dvys-card{
  display:block;
  border-radius:16px;
  overflow:hidden;
  background:linear-gradient(145deg,rgba(56,189,248,0.06),rgba(15,31,58,0.8));
  border:1px solid rgba(56,189,248,0.1);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  text-decoration:none;
  color:#fff;
  transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  animation:dvys-fadeInUp 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  position:relative;
  cursor:pointer;
}
.dvys-card:active{transform:scale(0.96)}
.dvys-card:hover{
  transform:translateY(-4px) scale(1.02);
  border-color:rgba(56,189,248,0.25);
  box-shadow:0 8px 30px rgba(56,189,248,0.1),0 4px 20px rgba(0,0,0,0.3);
}

.dvys-card-img{
  width:100%;overflow:hidden;position:relative;
  background:#0f1f3a;
}
.dvys-card-img img{width:100%;height:auto;display:block;object-fit:contain;transition:transform 0.4s}
.dvys-card:hover .dvys-card-img img{transform:scale(1.05)}
.dvys-card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 50%,rgba(10,22,40,0.6) 100%);
  pointer-events:none;
}

.dvys-card-body{
  padding:10px 12px;
  display:flex;justify-content:space-between;align-items:center;
}

.dvys-card-name{
  font-size:0.8rem;font-weight:700;
  background:linear-gradient(135deg,#fff,rgba(255,255,255,0.7));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.dvys-card-badge{
  font-size:0.6rem;font-weight:700;
  padding:4px 10px;border-radius:20px;
  background:linear-gradient(135deg,var(--dvys-accent-dark),var(--dvys-accent));
  color:var(--dvys-bg-primary);
  letter-spacing:0.5px;
}

/* LOCKED GAME - image still very visible, just slightly dimmed */
.dvys-card.locked .dvys-card-img img{
  filter:brightness(0.65);
}
.dvys-card.locked .dvys-card-overlay{
  background:rgba(10,22,40,0.25);
}
.dvys-card.locked .dvys-card-badge{
  background:linear-gradient(135deg,#555,#777);
  color:#ccc;
}

/* Lock icon overlay - WHITE lock, NO orange, NO animation */
.dvys-lock-overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:10;
  gap:6px;
  pointer-events:none;
}
.dvys-lock-icon{
  width:44px;height:44px;
  border-radius:50%;
  background:rgba(0,0,0,0.5);
  border:2px solid rgba(255,255,255,0.25);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.dvys-lock-icon svg{width:22px;height:22px;stroke:#ffffff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.dvys-lock-text{
  font-size:0.65rem;font-weight:700;
  color:rgba(255,255,255,0.9);
  text-transform:uppercase;
  letter-spacing:1.5px;
  text-shadow:0 1px 4px rgba(0,0,0,0.8);
}

/* FOOTER */
.dvys-footer{
  text-align:center;
  padding:24px 20px 40px;
  font-size:0.65rem;
  color:rgba(255,255,255,0.15);
  letter-spacing:1.5px;
  text-transform:uppercase;
  position:relative;z-index:1;
}

/* INFO MODAL */
.dvys-modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);
  z-index:200;justify-content:center;align-items:center;
}
.dvys-modal-overlay.show{display:flex}
.dvys-modal{
  background:linear-gradient(145deg,#0f1f3a,#0a1628);
  border:1px solid rgba(56,189,248,0.15);
  border-radius:24px;padding:28px 24px;
  max-width:380px;width:92%;
  animation:dvys-modalPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 40px rgba(56,189,248,0.05);
  max-height:90vh;overflow-y:auto;
}
@keyframes dvys-modalPop{
  from{transform:scale(0.8);opacity:0}
  to{transform:scale(1);opacity:1}
}
.dvys-modal h2{
  font-size:1.1rem;font-weight:800;
  color:var(--dvys-accent);
  margin-bottom:16px;
  text-align:center;
}
.dvys-modal p{font-size:0.82rem;color:var(--dvys-text-muted);line-height:1.6;margin-bottom:16px}
.dvys-modal-close{
  width:100%;padding:14px;
  border:1px solid rgba(56,189,248,0.2);
  border-radius:14px;
  background:rgba(56,189,248,0.08);
  color:var(--dvys-accent);
  font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:600;
  cursor:pointer;transition:all 0.3s;
}
.dvys-modal-close:hover{background:rgba(56,189,248,0.15)}

/* INFO MENU BUTTONS */
.dvys-info-menu{
  display:flex;flex-direction:column;gap:10px;
  margin-bottom:16px;
}
.dvys-info-btn-item{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;
  border-radius:14px;
  background:rgba(56,189,248,0.05);
  border:1px solid rgba(56,189,248,0.1);
  cursor:pointer;
  transition:all 0.25s;
  text-align:left;
}
.dvys-info-btn-item:hover{
  background:rgba(56,189,248,0.1);
  border-color:rgba(56,189,248,0.2);
}
.dvys-info-btn-item.active{
  background:rgba(56,189,248,0.08);
  border-color:rgba(56,189,248,0.25);
}
.dvys-info-btn-icon{
  width:40px;height:40px;min-width:40px;
  border-radius:12px;
  background:rgba(56,189,248,0.1);
  border:1px solid rgba(56,189,248,0.15);
  display:flex;align-items:center;justify-content:center;
}
.dvys-info-btn-icon svg{
  width:20px;height:20px;
  stroke:var(--dvys-accent);
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.dvys-info-btn-label{
  font-size:0.88rem;font-weight:700;
  color:#fff;
}
.dvys-info-btn-arrow{
  margin-left:auto;
  width:18px;height:18px;
  stroke:var(--dvys-text-muted);
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  transition:transform 0.3s;
}
.dvys-info-btn-item.active .dvys-info-btn-arrow{
  transform:rotate(90deg);
  stroke:var(--dvys-accent);
}

/* INFO PANEL (expandable content) */
.dvys-info-panel{
  display:none;
  padding:16px;
  border-radius:14px;
  background:rgba(56,189,248,0.03);
  border:1px solid rgba(56,189,248,0.08);
  margin-top:-6px;
  margin-bottom:10px;
  animation:dvys-panelSlide 0.3s ease both;
}
.dvys-info-panel.show{display:block}
@keyframes dvys-panelSlide{
  from{opacity:0;transform:translateY(-8px)}
  to{opacity:1;transform:translateY(0)}
}
.dvys-info-panel h3{
  font-size:0.92rem;font-weight:800;
  color:var(--dvys-accent);
  margin-bottom:10px;
}
.dvys-info-panel p{
  font-size:0.8rem;
  color:var(--dvys-text-muted);
  line-height:1.6;
  margin-bottom:8px;
}
.dvys-info-panel p:last-child{margin-bottom:0}
.dvys-info-panel p b{color:#fff;font-weight:600}
.dvys-promo{
  display:inline-block;
  padding:10px 24px;
  background:linear-gradient(135deg,rgba(56,189,248,0.15),rgba(56,189,248,0.05));
  border:2px dashed rgba(56,189,248,0.3);
  border-radius:14px;
  font-size:1.3rem;font-weight:900;
  color:var(--dvys-accent);
  letter-spacing:4px;
  margin-bottom:8px;
}
.dvys-bonus{
  font-size:0.95rem;font-weight:800;
  color:var(--dvys-green);
  margin-bottom:12px;
}

/* LOCK MODAL - clean cyan theme */
.dvys-lock-modal{
  background:linear-gradient(145deg,#0f1f3a,#0a1628);
  border:1px solid rgba(56,189,248,0.15);
  border-radius:24px;padding:28px 24px;
  max-width:380px;width:92%;text-align:center;
  animation:dvys-modalPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 40px rgba(56,189,248,0.05);
  max-height:90vh;overflow-y:auto;
}
.dvys-lock-modal h2{
  font-size:1.1rem;font-weight:800;
  color:var(--dvys-accent);
  margin-bottom:12px;
}
.dvys-lock-modal .game-name{
  font-size:1.3rem;font-weight:900;
  color:#fff;
  margin-bottom:6px;
}
.dvys-lock-modal .game-subtitle{
  font-size:0.78rem;
  color:var(--dvys-text-muted);
  margin-bottom:20px;
  line-height:1.5;
}

/* Referral link box */
.dvys-referral-box{
  background:rgba(56,189,248,0.06);
  border:1.5px dashed rgba(56,189,248,0.25);
  border-radius:12px;
  padding:12px 14px;
  margin-top:10px;
  display:flex;
  align-items:center;
  gap:10px;
}
.dvys-referral-link{
  flex:1;
  font-size:0.7rem;
  color:var(--dvys-accent);
  word-break:break-all;
  font-weight:600;
  line-height:1.4;
}
.dvys-copy-btn{
  padding:8px 14px;
  border-radius:8px;
  border:1px solid rgba(56,189,248,0.25);
  background:rgba(56,189,248,0.1);
  color:var(--dvys-accent);
  font-size:0.72rem;
  font-weight:700;
  cursor:pointer;
  transition:all 0.2s;
  white-space:nowrap;
  font-family:'Inter',sans-serif;
}
.dvys-copy-btn:hover{background:rgba(56,189,248,0.2)}
.dvys-copy-btn.copied{
  background:rgba(52,211,153,0.15);
  border-color:rgba(52,211,153,0.3);
  color:var(--dvys-green);
}

/* Progress */
.dvys-task-progress{
  height:6px;
  background:rgba(255,255,255,0.08);
  border-radius:3px;
  overflow:hidden;
  margin-bottom:10px;
}
.dvys-task-progress-bar{
  height:100%;
  border-radius:3px;
  transition:width 0.5s ease;
}
.dvys-task-progress-bar.ref{background:linear-gradient(90deg,var(--dvys-accent-dark),var(--dvys-accent))}
.dvys-task-progress-bar.dep{background:linear-gradient(90deg,#1a7a1a,var(--dvys-green))}
.dvys-task-progress-bar.done{background:linear-gradient(90deg,var(--dvys-green),#80ff80)}
.dvys-task-detail{
  font-size:0.82rem;
  color:var(--dvys-text-muted);
  font-weight:500;
}
.dvys-task-detail b{color:#fff}
.dvys-task-done{color:var(--dvys-green)!important}

/* CTA share text box */
.dvys-cta-box{
  background:rgba(56,189,248,0.06);
  border:1.5px solid rgba(56,189,248,0.18);
  border-radius:12px;
  padding:12px 14px;
  margin-top:12px;
  display:flex;
  align-items:stretch;
  gap:10px;
}
.dvys-cta-text{
  flex:1;
  font-size:0.78rem;
  color:var(--dvys-text-muted);
  line-height:1.5;
  white-space:pre-line;
  word-break:break-word;
  max-height:120px;
  overflow-y:auto;
}
.dvys-cta-text .cta-link{
  color:var(--dvys-accent);
  font-weight:700;
  word-break:break-all;
}

/* How it works info box */
.dvys-info-box{
  background:rgba(56,189,248,0.04);
  border:1px solid rgba(56,189,248,0.1);
  border-radius:12px;
  padding:14px 16px;
  margin-top:16px;
  text-align:left;
}
.dvys-info-box h4{
  font-size:0.72rem;font-weight:800;
  color:var(--dvys-accent);
  text-transform:uppercase;
  letter-spacing:0.8px;
  margin-bottom:10px;
}
.dvys-info-box .step{
  display:flex;align-items:flex-start;gap:8px;
  margin-bottom:7px;
  font-size:0.75rem;
  color:var(--dvys-text-muted);
  line-height:1.5;
}
.dvys-info-box .step:last-child{margin-bottom:0}
.dvys-info-box .step-num{
  width:20px;height:20px;min-width:20px;
  border-radius:50%;
  background:rgba(56,189,248,0.12);
  color:var(--dvys-accent);
  font-size:0.65rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  margin-top:1px;
}

/* Close button for lock modal */
.dvys-lock-modal-close{
  width:100%;padding:16px;
  border:1px solid rgba(56,189,248,0.2);
  border-radius:14px;
  background:rgba(56,189,248,0.08);
  color:var(--dvys-accent);
  font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:700;
  cursor:pointer;transition:all 0.3s;
  margin-top:16px;
}
.dvys-lock-modal-close:hover{background:rgba(56,189,248,0.15)}

/* Deposit info box */
.dvys-deposit-info{
  padding:14px 16px;
  border-radius:12px;
  text-align:center;
  margin-top:12px;
}
.dvys-deposit-info.remaining{
  background:rgba(251,191,36,0.08);
  border:1px solid rgba(251,191,36,0.2);
}
.dvys-deposit-info.needed{
  background:rgba(56,189,248,0.06);
  border:1px solid rgba(56,189,248,0.15);
}

/* FIXED BADGE */
.dvys-fixed-badge{
  position:fixed;bottom:16px;right:16px;
  padding:6px 14px;border-radius:20px;
  backdrop-filter:blur(16px);
  background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.12);
  font-size:0.6rem;font-weight:700;color:var(--dvys-accent);
  letter-spacing:1.5px;z-index:100;
  animation:dvys-badgeFloat 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes dvys-badgeFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-4px)}
}

/* RTL support for Arabic */
html[dir="rtl"] .dvys-lock-overlay{direction:rtl}
html[dir="rtl"] .dvys-info-box{text-align:right}
html[dir="rtl"] .dvys-info-box .step{flex-direction:row-reverse}

/* RESPONSIVE */
@media(max-width:400px){
  .dvys-hero h1{font-size:1.5rem}
  .dvys-grid{gap:10px;padding:0 12px 80px}
}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}
</style>
</head>
<body>

<!-- Floating coins -->
<div id="coins"></div>

<!-- HEADER -->
<div class="dvys-header">
  <div class="dvys-header-left">
    <img src="/identite_visuel.jpg" class="dvys-logo-img" alt="ROVAS">
    <div class="dvys-header-brand">
      <span class="dvys-brand-name">ROVAS</span>
      <span class="dvys-brand-sub" data-i18n="header_sub">1win Prediction</span>
    </div>
  </div>
  <div class="dvys-header-right">
    <div class="dvys-info-btn" onclick="toggleModal()">i</div>
  </div>

// Valid languages
var VALID_LANGS = ['fr','en','hi','uz','es','az','tr','ar','ru','pt'];

function getLang() {
  var params = new URLSearchParams(window.location.search);
  var lang = params.get('lang') || '';
  if (VALID_LANGS.indexOf(lang) === -1) {
    // Try stored language
    try {
      lang = sessionStorage.getItem('rovas_lang') || localStorage.getItem('rovas_lang') || 'fr';
    } catch(e) { lang = 'fr'; }
  }
  if (VALID_LANGS.indexOf(lang) === -1) lang = 'fr';
  return lang;
}

function t(key) {
  var l = I18N[currentLang] || I18N.fr;
  return l[key] || I18N.fr[key] || key;
}

function applyTranslations() {
  // RTL for Arabic
  if (currentLang === 'ar') {
    document.documentElement.setAttribute('dir', 'rtl');
    document.documentElement.setAttribute('lang', 'ar');
  } else {
    document.documentElement.setAttribute('dir', 'ltr');
    document.documentElement.setAttribute('lang', currentLang);
  }

  // Static text elements
  var els = document.querySelectorAll('[data-i18n]');
  for (var i = 0; i < els.length; i++) {
    var key = els[i].getAttribute('data-i18n');
    els[i].textContent = t(key);
  }

  // Hero title
  var heroTitle = document.querySelector('.dvys-hero h1');
  if (heroTitle) heroTitle.textContent = t('hero_title');

  // Info modal - panel texts (HTML content)
  document.getElementById('infoPlatformText').innerHTML = t('info_platform_text');
  document.getElementById('infoUnlockText').innerHTML = t('info_unlock_text');
  document.getElementById('infoPromoText').innerHTML = t('info_promo_text');
  document.getElementById('infoStatsText').innerHTML = t('info_stats_text');

  // Stats link with current language
  var statsLink = document.getElementById('statsLink');
  if (statsLink) statsLink.href = '/stats?lang=' + currentLang;
}

// ─── USER ID (from URL params) ───
function getUserId() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('user_id')) return parseInt(params.get('user_id'));
  if (params.get('uid')) return parseInt(params.get('uid'));
  try {
    var tgId = sessionStorage.getItem('rovas_telegram_id') || localStorage.getItem('rovas_telegram_id');
    if (tgId) return parseInt(tgId);
    var savedId = localStorage.getItem('rovas_win_id');
    if (savedId) return parseInt(savedId);
  } catch(e) {}
  return 0;
}

// ─── LOAD GAMES ───
async function loadGames() {
  var userId = getUserId();
  var url = '/api/games?action=public&_t=' + Date.now();
  if (userId) url += '&user_id=' + userId;

  try {
    var res = await fetch(url, { cache: 'no-store' });
    var data = await res.json();
    document.getElementById('loadingGames').style.display = 'none';

    if (!data.success || !data.games || data.games.length === 0) {
      document.getElementById('gamesGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--dvys-text-muted);font-size:0.9rem">' + escHtml(t('no_games')) + '</div>';
      document.getElementById('gamesGrid').style.display = 'grid';
      return;
    }

    var games = data.games;
    var gWord = games.length > 1 ? t('hero_games_pl') : t('hero_games');
    document.getElementById('heroSubtitle').textContent = games.length + ' ' + gWord + ' \u00B7 ' + t('hero_after');
    renderGames(games);
    document.getElementById('gamesGrid').style.display = 'grid';
  } catch(e) {
    console.error('Load games error:', e);
    document.getElementById('loadingGames').innerHTML = '<div style="color:var(--dvys-red);font-size:0.85rem">' + escHtml(t('error_load')) + '</div>';
  }
}

function renderGames(games) {
  var grid = document.getElementById('gamesGrid');
  var html = '';
  games.forEach(function(g, i) {
    var isLocked = g.lock_status === 'locked';
    var delay = i * 60;
    var cardClass = 'dvys-card' + (isLocked ? ' locked' : '');
    var lockOverlay = '';

    if (isLocked) {
      lockOverlay = '<div class="dvys-lock-overlay">' +
        '<div class="dvys-lock-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>' +
        '<span class="dvys-lock-text">' + escHtml(t('locked')) + '</span>' +
      '</div>';
    }

    var clickHandler = isLocked ? 'onclick="showLockModal(' + g.id + ')"' : 'onclick="openGame(\'' + escHtml(g.game_url) + '\')"';
    var badgeText = isLocked ? t('locked') : t('play');
    var badgeStyle = isLocked ? ' style="background:linear-gradient(135deg,#555,#777);color:#ccc"' : '';

    html += '<div class="' + cardClass + '" style="animation-delay:' + delay + 'ms" ' + clickHandler + '>' +
      '<div class="dvys-card-img">' +
        '<img src="' + escHtml(g.image_url) + '" alt="' + escHtml(g.name) + '" loading="lazy" onerror="this.src=\'/identite_visuel.jpg\'">' +
        '<div class="dvys-card-overlay"></div>' +
        lockOverlay +
      '</div>' +
      '<div class="dvys-card-body">' +
        '<span class="dvys-card-name">' + escHtml(g.name) + '</span>' +
        '<span class="dvys-card-badge"' + badgeStyle + '>' + badgeText + '</span>' +
      '</div>' +
    '</div>';
  });
  grid.innerHTML = html;

  // Store games data for lock modal
  window._gamesData = games;
}

function openGame(url) {
  window.location.href = url;
}

// ─── LOCK MODAL (fixed: uses unlock_type as fallback) ───
function showLockModal(gameId) {
  var game = null;
  var games = window._gamesData || [];
  for (var i = 0; i < games.length; i++) {
    if (games[i].id === gameId) { game = games[i]; break; }
  }
  if (!game) return;

  var tasks = game.tasks || [];
  var progress = game.progress || {};
  var html = '';
  var isReferralLock = false;
  var isDepositLock = false;

  // Check tasks array first
  for (var ti = 0; ti < tasks.length; ti++) {
    if (tasks[ti].task_type === 'referrals') isReferralLock = true;
    if (tasks[ti].task_type === 'deposit_amount') isDepositLock = true;
  }

  // FALLBACK: If tasks is empty, check unlock_type from API
  if (!isReferralLock && !isDepositLock) {
    var ut = (game.unlock_type || '').toLowerCase();
    if (ut === 'referral' || ut === 'referrals') isReferralLock = true;
    else if (ut === 'deposit') isDepositLock = true;
  }

  if (isReferralLock) {
    // ─── REFERRAL LOCK MODAL ───
    var p = progress.referrals || {};
    var current = p.current || 0;
    var required = p.required || game.unlock_value || 1;
    var remaining = Math.max(0, required - current);
    var referralLink = p.referral_link || '';
    var isMet = current >= required;
    var pct = required > 0 ? Math.min(100, (current / required) * 100) : 0;
    var barClass = isMet ? 'done' : 'ref';
    var pl = required > 1 ? 's' : '';
    var shareMsg = t('share_msg');

    html = '<h2>' + (isMet ? t('ref_done_title') : t('ref_title')) + '</h2>' +
      '<div class="game-name">' + escHtml(game.name) + '</div>';

    if (isMet) {
      html += '<div class="game-subtitle">' + t('ref_done_subtitle') + '</div>';
    } else {
      html += '<div class="game-subtitle">' + t('ref_subtitle').replace('{n}', required).replace('{pl}', pl) + '</div>';
    }

    // Progress bar
    html += '<div style="margin:16px 0 6px">' +
      '<div class="dvys-task-progress" style="height:8px;margin-bottom:8px"><div class="dvys-task-progress-bar ' + barClass + '" style="width:' + pct + '%"></div></div>' +
      '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<div class="dvys-task-detail ' + (isMet ? 'dvys-task-done' : '') + '" style="font-size:0.85rem">' +
          (isMet ? t('ref_goal') : '<b>' + current + ' / ' + required + '</b> ' + t('ref_progress')) +
        '</div>' +
        (remaining > 0 ? '<div style="font-size:0.8rem;font-weight:800;color:var(--dvys-accent)">' + t('ref_remaining').replace('{n}', remaining) + '</div>' : '') +
      '</div>' +
    '</div>';

    if (!isMet && referralLink) {
      // CTA text + referral link - easy copy for sharing anywhere
      var fullCTA = shareMsg + '\n' + referralLink;
      var safeFullCTA = fullCTA.replace(/'/g, "\\'").replace(/\n/g, '\\n');
      html += '<div class="dvys-cta-box" id="ctaBox">' +
        '<div class="dvys-cta-text" id="ctaText">' + escHtml(shareMsg) + '<br><span class="cta-link">' + escHtml(referralLink) + '</span></div>' +
        '<button class="dvys-copy-btn" onclick="copyCTA(this, \'' + safeFullCTA + '\')" style="align-self:center">' + t('copy') + '</button>' +
      '</div>';

      // How it works - simplified
      html += '<div class="dvys-info-box">' +
        '<h4>' + t('how_title') + '</h4>' +
        '<div style="font-size:0.78rem;color:var(--dvys-text-muted);line-height:1.6">' + t('how_text') + '</div>' +
      '</div>';
    }

    html += '<button class="dvys-lock-modal-close" onclick="closeLockModal()">' + t('close') + '</button>';

  } else if (isDepositLock) {
    // ─── DEPOSIT LOCK MODAL ───
    var p2 = progress.deposit_amount || {};
    var current2 = parseFloat(p2.current || 0);
    var required2 = parseFloat(p2.required || game.unlock_value || 0);
    var remaining2 = Math.max(0, required2 - current2);
    var isMet2 = current2 >= required2;
    var pct2 = required2 > 0 ? Math.min(100, (current2 / required2) * 100) : 0;
    var barClass2 = isMet2 ? 'done' : 'dep';

    html = '<h2>' + (isMet2 ? t('dep_done_title') : t('dep_title')) + '</h2>' +
      '<div class="game-name">' + escHtml(game.name) + '</div>';

    if (isMet2) {
      html += '<div class="game-subtitle">' + t('dep_done_subtitle') + '</div>';
    } else {
      html += '<div class="game-subtitle">' + t('dep_subtitle').replace('${n}', '$' + required2.toFixed(2)) + '</div>';
    }

    // Progress bar
    html += '<div style="margin:16px 0 6px">' +
      '<div class="dvys-task-progress" style="height:8px;margin-bottom:8px"><div class="dvys-task-progress-bar ' + barClass2 + '" style="width:' + pct2 + '%"></div></div>' +
      '<div class="dvys-task-detail ' + (isMet2 ? 'dvys-task-done' : '') + '" style="font-size:0.85rem">' +
        (isMet2 ? '\u2713' : '<b>$' + current2.toFixed(2) + '</b> / $' + required2.toFixed(2)) +
      '</div>' +
    '</div>';

    if (!isMet2 && remaining2 > 0) {
      html += '<div class="dvys-deposit-info remaining">' +
        '<div style="font-size:0.72rem;color:var(--dvys-orange);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">' + t('dep_remaining_label') + '</div>' +
        '<div style="font-size:1.4rem;font-weight:900;color:#fff">$' + remaining2.toFixed(2) + '</div>' +
        '<div style="font-size:0.72rem;color:var(--dvys-text-muted);margin-top:4px">' + t('dep_for_unlock') + '</div>' +
      '</div>';
    } else if (!isMet2 && current2 === 0) {
      html += '<div class="dvys-deposit-info needed">' +
        '<div style="font-size:0.72rem;color:var(--dvys-accent);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">' + t('dep_needed_label') + '</div>' +
        '<div style="font-size:1.4rem;font-weight:900;color:#fff">$' + required2.toFixed(2) + '</div>' +
        '<div style="font-size:0.72rem;color:var(--dvys-text-muted);margin-top:4px">' + t('dep_min_text') + '</div>' +
      '</div>';
    }

    html += '<button class="dvys-lock-modal-close" onclick="closeLockModal()">' + t('close') + '</button>';

  } else {
    // ─── GENERIC LOCK MODAL ───
    html = '<h2>' + t('gen_title') + '</h2>' +
      '<div class="game-name">' + escHtml(game.name) + '</div>' +
      '<div class="game-subtitle">' + t('gen_text') + '</div>' +
      '<button class="dvys-lock-modal-close" onclick="closeLockModal()">' + t('close') + '</button>';
  }

  document.getElementById('lockModalContent').innerHTML = html;
  document.getElementById('lockModal').classList.add('show');
}

function closeLockModal() {
  document.getElementById('lockModal').classList.remove('show');
}

function copyReferral(btn, link) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(link).then(function() {
      btn.textContent = t('copied');
      btn.classList.add('copied');
      setTimeout(function() {
        btn.textContent = t('copy');
        btn.classList.remove('copied');
      }, 2000);
    }).catch(function() {
      fallbackCopy(btn, link);
    });
  } else {
    fallbackCopy(btn, link);
  }
}

function fallbackCopy(btn, link) {
  var ta = document.createElement('textarea');
  ta.value = link;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    btn.textContent = t('copied');
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = t('copy');
      btn.classList.remove('copied');
    }, 2000);
  } catch(e) {
    btn.textContent = 'Erreur';
    setTimeout(function() { btn.textContent = t('copy'); }, 1500);
  }
  document.body.removeChild(ta);
}

function escHtml(str) {
  var div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function escAttr(str) {
  return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ─── COPY CTA TEXT (global function) ───
function copyCTA(btn, fullText) {
  // Decode escaped newlines
  var decoded = fullText.replace(/\\n/g, '\n');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(decoded).then(function() {
      btn.textContent = t('copied');
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = t('copy'); btn.classList.remove('copied'); }, 2000);
    }).catch(function() {
      fallbackCopyCTA(btn, decoded);
    });
  } else {
    fallbackCopyCTA(btn, decoded);
  }
}

function fallbackCopyCTA(btn, text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    btn.textContent = t('copied');
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = t('copy'); btn.classList.remove('copied'); }, 2000);
  } catch(e) {
    btn.textContent = 'Erreur';
    setTimeout(function() { btn.textContent = t('copy'); }, 1500);
  }
  document.body.removeChild(ta);
}

function toggleModal(){
  var modal = document.getElementById('infoModal');
  if (modal.classList.contains('show')) {
    modal.classList.remove('show');
    // Reset panels
    var panels = document.querySelectorAll('.dvys-info-panel');
    for (var i = 0; i < panels.length; i++) panels[i].classList.remove('show');
    var btns = document.querySelectorAll('.dvys-info-btn-item');
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  } else {
    modal.classList.add('show');
  }
}

function toggleInfoPanel(type) {
  var panels = {
    'platform': 'infoPanelPlatform',
    'unlock': 'infoPanelUnlock',
    'promo': 'infoPanelPromo',
    'stats': 'infoPanelStats'
  };
  var panel = document.getElementById(panels[type]);
  var btns = document.querySelectorAll('.dvys-info-btn-item');

  // Close all panels first
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  var allPanels = document.querySelectorAll('.dvys-info-panel');
  for (var i = 0; i < allPanels.length; i++) allPanels[i].classList.remove('show');

  // Toggle the clicked one
  if (panel) {
    panel.classList.toggle('show');
    // Activate the corresponding button
    var idx = type === 'platform' ? 0 : type === 'unlock' ? 1 : type === 'promo' ? 2 : 3;
    btns[idx].classList.add('active');
  }
}
