<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ROVAS · Statistiques</title>
<link rel="icon" href="/logo.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{touch-action:manipulation!important;-ms-content-zooming:none;overscroll-behavior:none;height:100%}
:root{
  --bg:#fff5f8;--bg2:#fce8f0;
  --accent:#e8388f;--accent-dk:#c42a75;--accent-lt:#f472b6;
  --green:#1a9a6a;--red:#d94444;--orange:#d4940a;
  --text:#2d0a1e;--muted:#9b6880;
  --glass:rgba(255,255,255,0.65);--glass-b:rgba(240,72,144,0.10);
  --card:rgba(255,255,255,0.95);--card-b:rgba(240,72,144,0.15);
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
body{
  font-family:var(--font);color:var(--text);
  overflow-x:hidden;-webkit-tap-highlight-color:transparent;
  background:var(--bg);
  min-height:100%;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 600px 400px at 20% 20%,rgba(240,72,144,0.04),transparent),
    radial-gradient(ellipse 500px 500px at 80% 75%,rgba(240,72,144,0.06),transparent);
}

.page{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:0 16px 100px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 0 22px}
.header-left{display:flex;align-items:center;gap:12px}
.back-btn{
  width:36px;height:36px;border-radius:10px;border:none;
  background:rgba(240,72,144,0.08);border:1px solid rgba(240,72,144,0.10);
  color:var(--accent);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .15s;
}
.back-btn:active{opacity:.6}
.back-btn svg{width:18px;height:18px}
.header-titles h1{font-size:.92rem;font-weight:700;color:var(--text);letter-spacing:-.2px}
.header-titles span{font-size:.62rem;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.header-date{font-size:.7rem;color:var(--muted);font-weight:600;background:rgba(240,72,144,0.08);border:1px solid rgba(240,72,144,0.10);padding:6px 10px;border-radius:8px}

/* SECTION */
.section{margin-bottom:22px}
.section-label{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;padding-left:2px}

/* METRICS ROW */
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.metric{
  background:rgba(255,255,255,0.8);
  border:1px solid rgba(240,72,144,0.15);border-radius:14px;
  padding:14px 10px;text-align:center;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.metric-icon{
  width:32px;height:32px;border-radius:8px;margin:0 auto 8px;
  display:flex;align-items:center;justify-content:center;
}
.metric-icon svg{width:18px;height:18px}
.metric-icon.cyan{background:rgba(232,56,143,0.08);color:var(--accent)}
.metric-icon.green{background:rgba(26,154,106,0.08);color:var(--green)}
.metric-icon.orange{background:rgba(212,148,10,0.08);color:var(--orange)}
.metric-value{font-size:1.05rem;font-weight:800;color:#2d0a1e;line-height:1.1}
.metric-label{font-size:.58rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}

/* TOP 10 GAMES */
.top10-card{
  background:rgba(255,255,255,0.8);
  border:1px solid rgba(240,72,144,0.15);border-radius:14px;
  padding:12px 14px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;gap:12px;
  margin-bottom:6px;transition:all .2s;
}
.top10-card.best{border-color:rgba(232,56,143,0.25);background:rgba(255,255,255,0.85)}
.top10-card:active{transform:scale(0.98)}
.top10-img{width:44px;height:44px;border-radius:10px;object-fit:cover;border:1px solid rgba(240,72,144,0.12);flex-shrink:0;background:rgba(255,255,255,0.6)}
.top10-info{flex:1;min-width:0}
.top10-name{font-size:.8rem;font-weight:700;color:#2d0a1e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top10-badge{
  display:inline-block;font-size:.52rem;font-weight:700;
  color:var(--accent);text-transform:uppercase;letter-spacing:.6px;
  padding:2px 7px;border-radius:6px;
  background:rgba(232,56,143,0.12);border:1px solid rgba(232,56,143,0.18);
  margin-bottom:3px;
}
.top10-stats{display:flex;gap:14px;margin-top:3px}
.top10-stat-val{font-size:.72rem;font-weight:700;color:var(--green);line-height:1.2}
.top10-stat-lbl{font-size:.48rem;color:var(--muted);text-transform:uppercase;letter-spacing:.2px}

/* LINE CHART (Canvas) */
.chart-card{
  background:rgba(255,255,255,0.7);
  border:1px solid rgba(240,72,144,0.15);border-radius:14px;
  padding:14px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.chart-title{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.chart-legend{display:flex;gap:12px;align-items:center}
.chart-legend-item{display:flex;align-items:center;gap:4px;font-size:.56rem;font-weight:600;color:var(--muted)}
.chart-legend-dot{width:8px;height:8px;border-radius:50%}
.chart-legend-dot.bets{background:var(--orange)}
.chart-legend-dot.wins{background:var(--green)}
.chart-legend-dot.players{background:var(--accent)}
canvas.line-chart{width:100%;height:180px;display:block;border-radius:8px}

/* HISTORY */
.history-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;
  background:rgba(255,255,255,0.7);
  border:1px solid rgba(240,72,144,0.10);border-radius:12px;
  margin-bottom:6px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.history-date-col{width:52px;flex-shrink:0}
.history-day{font-size:.82rem;font-weight:700;color:#2d0a1e;line-height:1.2}
.history-month{font-size:.56rem;color:var(--muted);font-weight:600}
.history-vals{flex:1;display:flex;gap:6px}
.history-val{flex:1;text-align:center;padding:4px 0;border-radius:8px;background:rgba(232,56,143,0.05)}
.history-val-num{font-size:.72rem;font-weight:700;color:#2d0a1e;line-height:1.2}
.history-val-num.g{color:var(--green)}
.history-val-num.o{color:var(--orange)}
.history-val-lbl{font-size:.48rem;color:var(--muted);text-transform:uppercase;letter-spacing:.2px;margin-top:1px}
.history-game{width:40px;height:40px;border-radius:10px;flex-shrink:0;object-fit:cover;border:1px solid rgba(240,72,144,0.10);background:rgba(255,255,255,0.6)}

/* ANIM */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .45s cubic-bezier(.34,1.56,.64,1) both}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(240,72,144,0.12);border-radius:2px}

/* EMPTY STATE */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state svg{width:40px;height:40px;opacity:.3;margin-bottom:12px}
.empty-state p{font-size:.8rem}

/* RTL */
html[dir="rtl"] .top10-stats{flex-direction:row-reverse}
html[dir="rtl"] .header-left{flex-direction:row-reverse}

@media(max-width:400px){
  .metric-value{font-size:.92rem}
  .top10-img{width:38px;height:38px}
  .history-game{width:36px;height:36px}
  canvas.line-chart{height:150px}
}
</style>
</head>

function t(key){var l=I18N[currentLang]||I18N.fr;return l[key]||I18N.fr[key]||key}

function applyTranslations(){
  if(currentLang==='ar'){document.documentElement.setAttribute('dir','rtl')}
  else{document.documentElement.setAttribute('dir','ltr')}
  var els=document.querySelectorAll('[data-i18n]');
  for(var i=0;i<els.length;i++){els[i].textContent=t(els[i].getAttribute('data-i18n'))}
}

function getLang(){
  var p=new URLSearchParams(window.location.search).get('lang')||'';
  if(VALID_LANGS.indexOf(p)===-1){try{p=sessionStorage.getItem('rovas_lang')||localStorage.getItem('rovas_lang')||'fr'}catch(e){p='fr'}}
  if(VALID_LANGS.indexOf(p)===-1)p='fr';
  return p;
}

function getGameImg(slug,imageUrl){if(imageUrl)return imageUrl;return GAME_IMAGES[slug]||DEFAULT_IMG}

function fmt$(n){if(n>=1000000)return'$'+(n/1000000).toFixed(1)+'M';if(n>=1000)return'$'+(n/1000).toFixed(1)+'K';return'$'+n.toLocaleString()}
function fmtNum(n){if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toLocaleString()}

function fmtDate(iso){
  var d;
  if(!iso){d=new Date()}
  else if(iso.indexOf('T')!==-1||iso.indexOf('Z')!==-1){d=new Date(iso)}
  else{d=new Date(iso+'T00:00:00')}
  if(isNaN(d.getTime()))d=new Date(iso);
  var frDays=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  var enDays=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months=['Jan','Fev','Mar','Avr','Mai','Jun','Jul','Aou','Sep','Oct','Nov','Dec'];
  var days={fr:frDays,en:enDays};
  var langDays=days[currentLang]||days.fr;
  return{day:d.getDate(),dayName:langDays[d.getDay()],month:months[d.getMonth()]};
}

// ─── LINE CHART (Canvas) ───
function drawLineChart(data) {
  var canvas = document.getElementById('lineChart');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;

  // Set canvas size for retina
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);

  var W = rect.width;
  var H = rect.height;
  var pad = { top: 16, right: 12, bottom: 28, left: 46 };
  var cw = W - pad.left - pad.right;
  var ch = H - pad.top - pad.bottom;

  // Reverse so oldest is first (left)
  var chart = data.slice().reverse();

  if (chart.length < 2) {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(155,104,128,0.4)';
    ctx.font = '12px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('...', W / 2, H / 2);
    return;
  }

  // Compute max values
  var maxBets = 1, maxWins = 1, maxPlayers = 1;
  for (var i = 0; i < chart.length; i++) {
    var b = Number(chart[i].total_bets) || 0;
    var w = Number(chart[i].total_winnings) || 0;
    var p = Number(chart[i].total_players) || 0;
    if (b > maxBets) maxBets = b;
    if (w > maxWins) maxWins = w;
    if (p > maxPlayers) maxPlayers = p;
  }
  var maxY = Math.max(maxBets, maxWins) * 1.15;

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = 'rgba(240,72,144,0.06)';
  ctx.lineWidth = 1;
  for (var g = 0; g <= 4; g++) {
    var gy = pad.top + (ch / 4) * g;
    ctx.beginPath();
    ctx.moveTo(pad.left, gy);
    ctx.lineTo(W - pad.right, gy);
    ctx.stroke();
    // Y labels (bets/wins scale)
    var yVal = maxY - (maxY / 4) * g;
    ctx.fillStyle = 'rgba(155,104,128,0.5)';
    ctx.font = '9px Inter, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(fmt$(Math.round(yVal)), pad.left - 6, gy + 3);
  }

  // X labels
  ctx.textAlign = 'center';
  var step = Math.max(1, Math.floor(chart.length / 6));
  for (var xi = 0; xi < chart.length; xi += step) {
    var xdate = fmtDate(chart[xi].stat_date);
    var xpos = pad.left + (cw / (chart.length - 1)) * xi;
    ctx.fillStyle = 'rgba(155,104,128,0.5)';
    ctx.font = '9px Inter, sans-serif';
    ctx.fillText(xdate.day + ' ' + xdate.month, xpos, H - 6);
  }
  // Always show last label
  var lastDate = fmtDate(chart[chart.length - 1].stat_date);
  ctx.fillText(lastDate.day + ' ' + lastDate.month, W - pad.right, H - 6);

  // Draw curves
  function drawCurve(key, color, maxVal, fillAlpha) {
    var pts = [];
    for (var ci = 0; ci < chart.length; ci++) {
      var val = Number(chart[ci][key]) || 0;
      var x = pad.left + (cw / (chart.length - 1)) * ci;
      var y = pad.top + ch - (val / maxVal) * ch;
      pts.push({ x: x, y: y });
    }

    // Gradient fill
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (var si = 1; si < pts.length; si++) {
      var cp1x = (pts[si - 1].x + pts[si].x) / 2;
      ctx.bezierCurveTo(cp1x, pts[si - 1].y, cp1x, pts[si].y, pts[si].x, pts[si].y);
    }
    ctx.lineTo(pts[pts.length - 1].x, pad.top + ch);
    ctx.lineTo(pts[0].x, pad.top + ch);
    ctx.closePath();
    var grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
    grad.addColorStop(0, color.replace(')', ',' + fillAlpha + ')').replace('rgb', 'rgba'));
    grad.addColorStop(1, color.replace(')', ',0.02)').replace('rgb', 'rgba'));
    ctx.fillStyle = grad;
    ctx.fill();

    // Line
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (var li = 1; li < pts.length; li++) {
      var cpx = (pts[li - 1].x + pts[li].x) / 2;
      ctx.bezierCurveTo(cpx, pts[li - 1].y, cpx, pts[li].y, pts[li].x, pts[li].y);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Dots (only if <= 15 points)
    if (chart.length <= 15) {
      for (var di = 0; di < pts.length; di++) {
        ctx.beginPath();
        ctx.arc(pts[di].x, pts[di].y, 3, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(pts[di].x, pts[di].y, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      }
    }
  }

  // Draw: Bets (orange), Winnings (green)
  drawCurve('total_bets', 'rgb(212,148,10)', maxY, 0.12);
  drawCurve('total_winnings', 'rgb(26,154,106)', maxY, 0.12);
}

function render(data){
  if(!data||!data.history||data.history.length===0){
    document.getElementById('metricsLabel').textContent=t('stats_no_data');
    document.getElementById('top10Section').style.display='none';
    document.getElementById('chartSection').style.display='none';
    document.getElementById('historyList').innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path d="M9 12h6"/></svg><p>'+t('stats_empty')+'</p></div>';
    return;
  }

  var latest=data.history[0];
  var rest=data.history.slice(1);

  // Header date
  var fd=fmtDate(latest.stat_date);
  document.getElementById('headerDate').textContent=fd.dayName+' '+fd.day+' '+fd.month;

  // Metrics
  document.getElementById('mPlayers').textContent=fmtNum(Number(latest.total_players)||0);
  document.getElementById('mBets').textContent=fmt$(Number(latest.total_bets)||0);
  document.getElementById('mWinnings').textContent=fmt$(Number(latest.total_winnings)||0);

  // Top 10 Games
  var games=latest.games||[];
  if(games.length>0){
    document.getElementById('top10Section').style.display='';
    var topHtml='';
    for(var gi=0;gi<games.length;gi++){
      var g=games[gi];
      var isBest=gi===0;
      topHtml+='<div class="top10-card'+(isBest?' best':'')+'">'+
        '<img class="top10-img" src="'+getGameImg(g.game_slug,g.image_url)+'" onerror="this.src=\''+DEFAULT_IMG+'\'" alt="">'+
        '<div class="top10-info">'+
          (isBest?'<div class="top10-badge">'+t('stats_best')+'</div>':'')+
          '<div class="top10-name">'+(g.game_name||g.game_slug)+'</div>'+
          '<div class="top10-stats">'+
            '<div><div class="top10-stat-val">'+g.players+'</div><div class="top10-stat-lbl">'+t('stats_players')+'</div></div>'+
            '<div><div class="top10-stat-val">'+fmt$(g.winnings)+'</div><div class="top10-stat-lbl">'+t('stats_winnings')+'</div></div>'+
          '</div>'+
        '</div>'+
      '</div>';
    }
    document.getElementById('top10List').innerHTML=topHtml;
  }else{
    document.getElementById('top10Section').style.display='none';
  }

  // Line Chart (up to 30 days)
  var chartData=data.history.slice(0,30);
  document.getElementById('chartSection').style.display='';
  drawLineChart(chartData);

  // History
  var histHtml='';
  var histData=rest.slice(0,20);
  for(var k=0;k<histData.length;k++){
    var h=histData[k];
    var hd=fmtDate(h.stat_date);
    histHtml+='<div class="history-item">'+
      '<div class="history-date-col"><div class="history-day">'+hd.day+'</div><div class="history-month">'+hd.month+'</div></div>'+
      '<div class="history-vals">'+
        '<div class="history-val"><div class="history-val-num">'+h.total_players+'</div><div class="history-val-lbl">'+t('stats_players')+'</div></div>'+
        '<div class="history-val"><div class="history-val-num o">'+fmt$(h.total_bets)+'</div><div class="history-val-lbl">'+t('stats_bets')+'</div></div>'+
        '<div class="history-val"><div class="history-val-num g">'+fmt$(h.total_winnings)+'</div><div class="history-val-lbl">'+t('stats_winnings')+'</div></div>'+
      '</div>'+
      (h.top_game_slug?'<img class="history-game" src="'+getGameImg(h.top_game_slug,h.top_game_image)+'" onerror="this.src=\''+DEFAULT_IMG+'\'" alt="">':'')+
    '</div>';
  }
  document.getElementById('historyList').innerHTML=histHtml||'<div class="empty-state"><p>'+t('stats_empty')+'</p></div>';
}

// Init
currentLang=getLang();
applyTranslations();

// Fetch language from DB if we have userId
var urlParams=new URLSearchParams(window.location.search);
var uid=urlParams.get('uid')||urlParams.get('user_id')||'';
async function fetchLang(){
  if(!uid)return;
  try{
    var r=await fetch('/api/games?action=user_lang&user_id='+uid+'&_t='+Date.now(),{cache:'no-store'});
    var d=await r.json();
    if(d&&d.lang&&VALID_LANGS.indexOf(d.lang)!==-1){
      currentLang=d.lang;
      applyTranslations();
    }
  }catch(e){}
}
fetchLang().then(function(){
  fetch(API,{cache:'no-store'})
    .then(function(r){return r.json()})
    .then(function(data){
      if(data.success&&data.history){render(data)}else{render(null)}
    })
    .catch(function(){render(null)});
});
})();
</script>
