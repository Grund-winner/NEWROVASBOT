<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ROVAS · Statistiques</title>
<link rel="icon" href="/identite_visuel.jpg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{touch-action:pan-x pan-y!important;overscroll-behavior:none;height:100%}
:root{
  --bg:#000a14;--bg2:#001020;
  --accent:#00c8ff;--accent-dk:#0099cc;--accent-lt:#66e0ff;
  --green:#00e676;--red:#ff5252;--orange:#ff9500;
  --text:#fff;--muted:#5a7a8f;
  --glass:rgba(0,200,255,0.06);--glass-b:rgba(0,200,255,0.10);
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  overflow-x:hidden;-webkit-tap-highlight-color:transparent;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 600px 400px at 20% 20%,rgba(0,200,255,0.035),transparent),
    radial-gradient(ellipse 500px 500px at 80% 75%,rgba(0,200,255,0.025),transparent);
}

.page{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:0 16px 100px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 0 22px}
.header-left{display:flex;align-items:center;gap:12px}
.back-btn{
  width:36px;height:36px;border-radius:10px;border:none;
  background:var(--glass);border:1px solid var(--glass-b);
  color:var(--accent);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .15s;
}
.back-btn:active{opacity:.6}
.back-btn svg{width:18px;height:18px}
.header-titles h1{font-size:.92rem;font-weight:700;color:var(--text);letter-spacing:-.2px}
.header-titles span{font-size:.62rem;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.header-date{font-size:.7rem;color:var(--muted);font-weight:600;background:var(--glass);border:1px solid var(--glass-b);padding:6px 10px;border-radius:8px}

/* SECTION */
.section{margin-bottom:22px}
.section-label{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;padding-left:2px}

/* METRICS ROW */
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.metric{
  background:linear-gradient(145deg,rgba(0,200,255,0.04),rgba(0,16,32,0.7));
  border:1px solid var(--glass-b);border-radius:14px;
  padding:14px 10px;text-align:center;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.metric-icon{
  width:32px;height:32px;border-radius:8px;margin:0 auto 8px;
  display:flex;align-items:center;justify-content:center;
}
.metric-icon svg{width:18px;height:18px}
.metric-icon.cyan{background:rgba(0,200,255,0.10);color:var(--accent)}
.metric-icon.green{background:rgba(0,230,118,0.10);color:var(--green)}
.metric-icon.orange{background:rgba(255,149,0,0.10);color:var(--orange)}
.metric-value{font-size:1.15rem;font-weight:800;color:#fff;line-height:1.1}
.metric-label{font-size:.58rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}

/* TOP 10 GAMES */
.top10-card{
  background:linear-gradient(145deg,rgba(0,200,255,0.04),rgba(0,16,32,0.7));
  border:1px solid var(--glass-b);border-radius:14px;
  padding:12px 14px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:center;gap:12px;
  margin-bottom:6px;transition:all .2s;
}
.top10-card.best{border-color:rgba(0,200,255,0.25);background:linear-gradient(145deg,rgba(0,200,255,0.08),rgba(0,16,32,0.8))}
.top10-card:active{transform:scale(0.98)}
.top10-img{width:44px;height:44px;border-radius:10px;object-fit:cover;border:1px solid rgba(0,200,255,0.12);flex-shrink:0;background:var(--bg2)}
.top10-info{flex:1;min-width:0}
.top10-name{font-size:.8rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top10-badge{
  display:inline-block;font-size:.52rem;font-weight:700;
  color:var(--accent);text-transform:uppercase;letter-spacing:.6px;
  padding:2px 7px;border-radius:6px;
  background:rgba(0,200,255,0.12);border:1px solid rgba(0,200,255,0.18);
  margin-bottom:3px;
}
.top10-stats{display:flex;gap:14px;margin-top:3px}
.top10-stat-val{font-size:.72rem;font-weight:700;color:var(--green);line-height:1.2}
.top10-stat-lbl{font-size:.48rem;color:var(--muted);text-transform:uppercase;letter-spacing:.2px}

/* MINI CHART */
.chart-card{
  background:linear-gradient(145deg,rgba(0,200,255,0.04),rgba(0,16,32,0.7));
  border:1px solid var(--glass-b);border-radius:14px;
  padding:14px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.chart-title{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.chart-value{font-size:.72rem;font-weight:700;color:var(--accent)}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:80px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.chart-bar{
  width:100%;border-radius:4px 4px 2px 2px;
  background:linear-gradient(180deg,var(--accent),var(--accent-dk));
  min-height:4px;transition:height 1s cubic-bezier(.4,0,.2,1);
}
.chart-bar.empty{background:rgba(0,200,255,0.08)}
.chart-bar-label{font-size:.52rem;color:var(--muted);font-weight:600}

/* HISTORY */
.history-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;
  background:linear-gradient(145deg,rgba(0,200,255,0.03),rgba(0,16,32,0.5));
  border:1px solid rgba(0,200,255,0.06);border-radius:12px;
  margin-bottom:6px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.history-date-col{width:52px;flex-shrink:0}
.history-day{font-size:.82rem;font-weight:700;color:#fff;line-height:1.2}
.history-month{font-size:.56rem;color:var(--muted);font-weight:600}
.history-vals{flex:1;display:flex;gap:6px}
.history-val{flex:1;text-align:center;padding:4px 0;border-radius:8px;background:rgba(0,200,255,0.03)}
.history-val-num{font-size:.72rem;font-weight:700;color:#fff;line-height:1.2}
.history-val-num.g{color:var(--green)}
.history-val-lbl{font-size:.48rem;color:var(--muted);text-transform:uppercase;letter-spacing:.2px;margin-top:1px}
.history-game{width:40px;height:40px;border-radius:10px;flex-shrink:0;object-fit:cover;border:1px solid rgba(0,200,255,0.1);background:var(--bg2)}

/* ANIM */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .45s cubic-bezier(.34,1.56,.64,1) both}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,200,255,0.12);border-radius:2px}

/* EMPTY STATE */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state svg{width:40px;height:40px;opacity:.3;margin-bottom:12px}
.empty-state p{font-size:.8rem}

/* RTL */
html[dir="rtl"] .top10-stats{flex-direction:row-reverse}
html[dir="rtl"] .header-left{flex-direction:row-reverse}

@media(max-width:400px){
  .metric-value{font-size:1rem}
  .top10-img{width:38px;height:38px}
  .history-game{width:36px;height:36px}
}
</style>
</head>
<body>

<div class="page">
  <div class="header anim" style="animation-delay:0s">
    <div class="header-left">
      <button class="back-btn" onclick="window.history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="header-titles">
        <h1 id="pageTitle" data-i18n="stats_title">Statistiques</h1>
        <span id="pageSubtitle" data-i18n="stats_subtitle">Performances quotidiennes</span>
      </div>
    </div>
    <div class="header-date" id="headerDate">...</div>
  </div>

  <div class="section anim" style="animation-delay:.06s">
    <div class="section-label" id="metricsLabel" data-i18n="stats_latest">Dernieres donnees</div>
    <div class="metrics" id="metricsRow">
      <div class="metric">
        <div class="metric-icon cyan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        </div>
        <div class="metric-value" id="mPlayers">--</div>
        <div class="metric-label" id="mPlayersLabel" data-i18n="stats_players">Joueurs</div>
      </div>
      <div class="metric">
        <div class="metric-icon orange">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <div class="metric-value" id="mBets">--</div>
        <div class="metric-label" id="mBetsLabel" data-i18n="stats_bets">Mises</div>
      </div>
      <div class="metric">
        <div class="metric-icon green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <div class="metric-value" id="mWinnings">--</div>
        <div class="metric-label" id="mWinningsLabel" data-i18n="stats_winnings">Gains</div>
      </div>
    </div>
  </div>

  <div class="section anim" style="animation-delay:.12s" id="top10Section">
    <div class="section-label" id="top10Label" data-i18n="stats_top_games">Top jeux</div>
    <div id="top10List"></div>
  </div>

  <div class="section anim" style="animation-delay:.18s" id="chartSection">
    <div class="section-label" id="chartLabel" data-i18n="stats_trend">Tendance gains (7j)</div>
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title" id="chartTitle" data-i18n="stats_daily_winnings">Gains quotidiens</span>
        <span class="chart-value" id="chartAvg">...</span>
      </div>
      <div class="chart-bars" id="chartBars"></div>
    </div>
  </div>

  <div class="section anim" style="animation-delay:.24s" id="historySection">
    <div class="section-label" id="historyLabel" data-i18n="stats_history">Historique</div>
    <div id="historyList"></div>
  </div>
</div>

<script>
(function(){
var API='/api/games?action=stats';
var VALID_LANGS=['fr','en','hi','uz','es','az','tr','ar','ru','pt'];
var currentLang='fr';

var GAME_IMAGES={
  'astronaut':'/games/astronaut.avif','chicken-road':'/games/chichen_run.avif','chicken_road':'/games/chichen_run.avif',
  'crash':'/games/crash.avif','crime-empire':'/games/crime_empire.avif','fortune':'/games/fortune_crash.avif',
  'fox-job':'/games/fox.avif','foxjob':'/games/fox.avif','goall':'/games/goal.avif','GOALL':'/games/goal.avif',
  'lucky-jet':'/games/lucky.avif','luckjet':'/games/lucky.avif','metacrash':'/games/meta.avif',
  'rocket-queen':'/games/rocky.avif','rocketqueen':'/games/rocky.avif','rocket-x':'/games/rocktx.avif',
  'rocketx':'/games/rocktx.avif','tropicana':'/games/tropicana.avif','topiciana':'/games/tropicana.avif'
};
var DEFAULT_IMG='/identite_visuel.jpg';

var I18N={
  fr:{
    stats_title:'Statistiques',stats_subtitle:'Performances quotidiennes',stats_latest:'Dernieres donnees',
    stats_players:'Joueurs',stats_bets:'Mises',stats_winnings:'Gains',stats_top_games:'Top jeux',
    stats_trend:'Tendance gains (7j)',stats_daily_winnings:'Gains quotidiens',stats_avg:'Moy',
    stats_history:'Historique',stats_no_data:'Aucune statistique disponible',stats_empty:'Aucun historique',
    stats_best:'Top jeu'
  },
  en:{
    stats_title:'Statistics',stats_subtitle:'Daily performance',stats_latest:'Latest data',
    stats_players:'Players',stats_bets:'Bets',stats_winnings:'Winnings',stats_top_games:'Top games',
    stats_trend:'Winnings trend (7d)',stats_daily_winnings:'Daily winnings',stats_avg:'Avg',
    stats_history:'History',stats_no_data:'No statistics available',stats_empty:'No history',
    stats_best:'Top game'
  },
  hi:{
    stats_title:'Statistics',stats_subtitle:'Daily performance',stats_latest:'Latest data',
    stats_players:'Players',stats_bets:'Bets',stats_winnings:'Winnings',stats_top_games:'Top games',
    stats_trend:'Winnings trend (7d)',stats_daily_winnings:'Daily winnings',stats_avg:'Avg',
    stats_history:'History',stats_no_data:'No statistics available',stats_empty:'No history',
    stats_best:'Top game'
  },
  uz:{
    stats_title:'Statistika',stats_subtitle:'Kunlik natijalar',stats_latest:'Oxirgi ma\'lumotlar',
    stats_players:'O\'yinchi',stats_bets:'Stavkalar',stats_winnings:'Yutuqlar',stats_top_games:'Top o\'yinlar',
    stats_trend:'Yutuqlar tendensiyasi (7k)',stats_daily_winnings:'Kunlik yutuqlar',stats_avg:'O\'rt',
    stats_history:'Tarix',stats_no_data:'Statistika mavjud emas',stats_empty:'Tarix yo\'q',
    stats_best:'Top o\'yin'
  },
  es:{
    stats_title:'Estadisticas',stats_subtitle:'Rendimiento diario',stats_latest:'Ultimos datos',
    stats_players:'Jugadores',stats_bets:'Apuestas',stats_winnings:'Ganancias',stats_top_games:'Top juegos',
    stats_trend:'Tendencia ganancias (7d)',stats_daily_winnings:'Ganancias diarias',stats_avg:'Prom',
    stats_history:'Historial',stats_no_data:'Sin estadisticas disponibles',stats_empty:'Sin historial',
    stats_best:'Top juego'
  },
  az:{
    stats_title:'Statistika',stats_subtitle:'Günlük nəticələr',stats_latest:'Son məlumatlar',
    stats_players:'Oyunçu',stats_bets:'Mərclər',stats_winnings:'Qazanclar',stats_top_games:'Top oyunlar',
    stats_trend:'Qazanc tendensiyası (7g)',stats_daily_winnings:'Günlük qazanclar',stats_avg:'Ort',
    stats_history:'Tarix',stats_no_data:'Statistika yoxdur',stats_empty:'Tarix yoxdur',
    stats_best:'Top oyun'
  },
  tr:{
    stats_title:'Istatistikler',stats_subtitle:'Günlük performans',stats_latest:'Son veriler',
    stats_players:'Oyuncular',stats_bets:'Bahisler',stats_winnings:'Kazançlar',stats_top_games:'Top oyunlar',
    stats_trend:'Kazanç trendi (7g)',stats_daily_winnings:'Günlük kazançlar',stats_avg:'Ort',
    stats_history:'Gecmis',stats_no_data:'Istatistik mevcut degil',stats_empty:'Gecmis yok',
    stats_best:'Top oyun'
  },
  ar:{
    stats_title:'الإحصائيات',stats_subtitle:'الأداء اليومي',stats_latest:'أحدث البيانات',
    stats_players:'اللاعبون',stats_bets:'الرهانات',stats_winnings:'الأرباح',stats_top_games:'أفضل الألعاب',
    stats_trend:'اتجاه الأرباح (7 أيام)',stats_daily_winnings:'الأرباح اليومية',stats_avg:'المتوسط',
    stats_history:'السجل',stats_no_data:'لا توجد إحصائيات متاحة',stats_empty:'لا يوجد سجل',
    stats_best:'أفضل لعبة'
  },
  ru:{
    stats_title:'Статистика',stats_subtitle:'Ежедневная производительность',stats_latest:'Последние данные',
    stats_players:'Игроки',stats_bets:'Ставки',stats_winnings:'Выигрыши',stats_top_games:'Топ игр',
    stats_trend:'Тренд выигрышей (7д)',stats_daily_winnings:'Ежедневные выигрыши',stats_avg:'Ср',
    stats_history:'История',stats_no_data:'Статистика недоступна',stats_empty:'Нет истории',
    stats_best:'Топ игра'
  },
  pt:{
    stats_title:'Estatisticas',stats_subtitle:'Desempenho diario',stats_latest:'Ultimos dados',
    stats_players:'Jogadores',stats_bets:'Apostas',stats_winnings:'Ganhos',stats_top_games:'Top jogos',
    stats_trend:'Tendencia de ganhos (7d)',stats_daily_winnings:'Ganhos diarios',stats_avg:'Med',
    stats_history:'Historico',stats_no_data:'Sem estatisticas disponiveis',stats_empty:'Sem historico',
    stats_best:'Top jogo'
  }
};

function t(key){var l=I18N[currentLang]||I18N.fr;return l[key]||I18N.fr[key]||key}

function applyTranslations(){
  if(currentLang==='ar'){document.documentElement.setAttribute('dir','rtl')}
  else{document.documentElement.setAttribute('dir','ltr')}
  var els=document.querySelectorAll('[data-i18n]');
  for(var i=0;i<els.length;i++){els[i].textContent=t(els[i].getAttribute('data-i18n'))}
}

function getLang(){
  var p=new URLSearchParams(window.location.search).get('lang')||'';
  if(VALID_LANGS.indexOf(p)===-1){try{p=sessionStorage.getItem('rovas_lang')||localStorage.getItem('rovas_lang')||'fr'}catch(e){p='fr'}}
  if(VALID_LANGS.indexOf(p)===-1)p='fr';
  return p;
}

function getGameImg(slug,imageUrl){if(imageUrl)return imageUrl;return GAME_IMAGES[slug]||DEFAULT_IMG}

function fmt$(n){if(n>=1000)return'$'+(n/1000).toFixed(1)+'K';return'$'+n.toLocaleString()}

function fmtDate(iso){
  var d;
  if(!iso){d=new Date()}
  else if(iso.indexOf('T')!==-1||iso.indexOf('Z')!==-1){d=new Date(iso)}
  else{d=new Date(iso+'T00:00:00')}
  if(isNaN(d.getTime()))d=new Date(iso);
  var frDays=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  var enDays=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months=['Jan','Fev','Mar','Avr','Mai','Jun','Jul','Aou','Sep','Oct','Nov','Dec'];
  var days={fr:frDays,en:enDays};
  var langDays=days[currentLang]||days.fr;
  return{day:d.getDate(),dayName:langDays[d.getDay()],month:months[d.getMonth()]};
}

function render(data){
  if(!data||!data.history||data.history.length===0){
    document.getElementById('metricsLabel').textContent=t('stats_no_data');
    document.getElementById('top10Section').style.display='none';
    document.getElementById('chartSection').style.display='none';
    document.getElementById('historyList').innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path d="M9 12h6"/></svg><p>'+t('stats_empty')+'</p></div>';
    return;
  }

  var latest=data.history[0];
  var rest=data.history.slice(1);

  // Header date
  var fd=fmtDate(latest.stat_date);
  document.getElementById('headerDate').textContent=fd.dayName+' '+fd.day+' '+fd.month;

  // Metrics
  document.getElementById('mPlayers').textContent=Number(latest.total_players)||0;
  document.getElementById('mBets').textContent=fmt$(Number(latest.total_bets)||0);
  document.getElementById('mWinnings').textContent=fmt$(Number(latest.total_winnings)||0);

  // Top 10 Games
  var games=latest.games||[];
  if(games.length>0){
    document.getElementById('top10Section').style.display='';
    var topHtml='';
    for(var gi=0;gi<games.length;gi++){
      var g=games[gi];
      var isBest=gi===0;
      topHtml+='<div class="top10-card'+(isBest?' best':'')+'">'+
        '<img class="top10-img" src="'+getGameImg(g.game_slug,g.image_url)+'" onerror="this.src=\''+DEFAULT_IMG+'\'" alt="">'+
        '<div class="top10-info">'+
          (isBest?'<div class="top10-badge">'+t('stats_best')+'</div>':'')+
          '<div class="top10-name">'+(g.game_name||g.game_slug)+'</div>'+
          '<div class="top10-stats">'+
            '<div><div class="top10-stat-val">'+g.players+'</div><div class="top10-stat-lbl">'+t('stats_players')+'</div></div>'+
            '<div><div class="top10-stat-val">'+fmt$(g.winnings)+'</div><div class="top10-stat-lbl">'+t('stats_winnings')+'</div></div>'+
          '</div>'+
        '</div>'+
      '</div>';
    }
    document.getElementById('top10List').innerHTML=topHtml;
  }else{
    document.getElementById('top10Section').style.display='none';
  }

  // Chart (last 7)
  var chartData=data.history.slice(0,7).reverse();
  var maxW=1;
  for(var ci=0;ci<chartData.length;ci++){var w=Number(chartData[ci].total_winnings)||0;if(w>maxW)maxW=w}
  var barsHtml='';
  var sum=0;
  for(var cj=0;cj<chartData.length;cj++){
    var c=chartData[cj];
    var cw=Number(c.total_winnings)||0;
    var pct=(cw/maxW)*100;
    var dd=fmtDate(c.stat_date);
    sum+=cw;
    barsHtml+='<div class="chart-bar-wrap"><div class="chart-bar'+(pct<5?' empty':'')+'" style="height:'+Math.max(pct,4)+'%"></div><span class="chart-bar-label">'+dd.day+'</span></div>';
  }
  document.getElementById('chartBars').innerHTML=barsHtml;
  var avgVal=sum/chartData.length;
  document.getElementById('chartAvg').textContent=t('stats_avg')+': '+fmt$(Math.round(avgVal));

  // History
  var histHtml='';
  var histData=rest.slice(0,15);
  for(var k=0;k<histData.length;k++){
    var h=histData[k];
    var hd=fmtDate(h.stat_date);
    histHtml+='<div class="history-item">'+
      '<div class="history-date-col"><div class="history-day">'+hd.day+'</div><div class="history-month">'+hd.month+'</div></div>'+
      '<div class="history-vals">'+
        '<div class="history-val"><div class="history-val-num">'+h.total_players+'</div><div class="history-val-lbl">'+t('stats_players')+'</div></div>'+
        '<div class="history-val"><div class="history-val-num">'+fmt$(h.total_bets)+'</div><div class="history-val-lbl">'+t('stats_bets')+'</div></div>'+
        '<div class="history-val"><div class="history-val-num g">'+fmt$(h.total_winnings)+'</div><div class="history-val-lbl">'+t('stats_winnings')+'</div></div>'+
      '</div>'+
      (h.top_game_slug?'<img class="history-game" src="'+getGameImg(h.top_game_slug,h.top_game_image)+'" onerror="this.src=\''+DEFAULT_IMG+'\'" alt="">':'')+
    '</div>';
  }
  document.getElementById('historyList').innerHTML=histHtml||'<div class="empty-state"><p>'+t('stats_empty')+'</p></div>';
}

// Init
currentLang=getLang();
applyTranslations();

fetch(API,{cache:'no-store'})
  .then(function(r){return r.json()})
  .then(function(data){
    if(data.success&&data.history){render(data)}else{render(null)}
  })
  .catch(function(){render(null)});
})();
</script>
</body>
</html>
