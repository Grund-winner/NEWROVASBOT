<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ROVAS - Predictions</title>
    <link rel="icon" href="/images/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="/images/logo.png">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{touch-action:manipulation;overscroll-behavior:none;-webkit-text-size-adjust:100%;text-size-adjust:100%}
        input,select,textarea,button{font-size:16px!important}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#EBF4FF 0%,#DBEAFE 30%,#E0E7FF 60%,#F0F9FF 100%);color:#1E293B;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .container{width:100%;max-width:420px}
        .brand{text-align:center;margin-bottom:32px}
        .brand h1{font-size:24px;font-weight:800;color:#0F172A;letter-spacing:1px}
        .brand p{font-size:14px;color:#64748B;margin-top:4px}
        .card{background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:20px;padding:32px 28px;box-shadow:0 4px 24px rgba(0,0,0,.06);border:1px solid rgba(255,255,255,.7);animation:fadeUp .5s ease}
        .card-title{text-align:center;font-size:17px;font-weight:600;color:#0F172A;margin-bottom:6px}
        .card-subtitle{text-align:center;font-size:13px;color:#94A3B8;margin-bottom:24px;line-height:1.5}
        .input-group{margin-bottom:16px}
        .input-group label{display:block;font-size:13px;font-weight:500;color:#475569;margin-bottom:8px;text-align:center}
        .input-wrapper{position:relative;display:flex;align-items:center}
        .input-wrapper .icon{position:absolute;left:14px;display:flex}
        .input-wrapper input{width:100%;padding:14px 14px 14px 42px;border:1.5px solid #E2E8F0;border-radius:12px;background:#F8FAFC;font-size:16px;font-weight:500;color:#1E293B;outline:none;transition:all .2s;letter-spacing:.3px}
        .input-wrapper input::placeholder{color:#CBD5E1;font-weight:400;letter-spacing:0}
        .input-wrapper input:focus{border-color:#2563EB;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
        .btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:-.2px;margin-top:8px}
        .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.35)}
        .btn-primary:disabled{background:#94A3B8;cursor:not-allowed;transform:none;box-shadow:none}
        .loader{display:none;width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
        @keyframes spin{to{transform:rotate(360deg)}}
        .msg{margin-top:16px;padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.5;display:none;font-weight:500}
        .msg.error{display:block;background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
        .msg.success{display:block;background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0}
        .footer{text-align:center;margin-top:24px;font-size:12px;color:#94A3B8}
        .iframe-wrap{display:none;width:100%;height:100vh;position:fixed;top:0;left:0;z-index:100}
        .iframe-wrap iframe{width:100%;height:100%;border:none}
        .float-exit{display:none;position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:1001;height:32px;padding:0 14px;background:rgba(255,255,255,.92);border-radius:10px;align-items:center;justify-content:center;gap:6px;box-shadow:0 2px 12px rgba(0,0,0,.08);cursor:pointer;border:1px solid rgba(0,0,0,.06);font-size:12px;font-weight:500;color:#64748B;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
        .float-exit.visible{opacity:1;pointer-events:auto}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>
    <div id="floatExit" class="float-exit" onclick="doExit()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Quitter</span>
    </div>
    <div id="iframeWrap" class="iframe-wrap">
        <iframe id="predictionFrame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms" allowfullscreen></iframe>
    </div>
    <div id="loadingScreen" class="container" style="display:none;">
        <div style="text-align:center;padding-top:80px;">
            <div style="width:48px;height:48px;border:3px solid #E2E8F0;border-top-color:#2563EB;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px;"></div>
            <div style="font-size:15px;color:#64748B;font-weight:500;">Verification de l'acces...</div>
        </div>
    </div>
    <div id="loginContainer" class="container">
        <div class="brand">
            <h1>ROVAS</h1>
            <p>Predictions casino 1Win</p>
        </div>
        <div class="card">
            <div class="card-title">Acces aux predictions</div>
            <div class="card-subtitle">Entrez votre identifiant 1Win pour acceder aux predictions.</div>
            <div class="input-group">
                <label>Identifiant 1Win</label>
                <div class="input-wrapper">
                    <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                    <input type="text" id="winIdInput" placeholder="Ex : 123456789" autocomplete="off" inputmode="numeric">
                </div>
            </div>
            <button class="btn-primary" id="submitBtn" onclick="login()">
                <span id="btnText">Acceder aux predictions</span>
                <div class="loader" id="loader"></div>
            </button>
            <div id="errorMsg" class="msg error"></div>
            <div id="successMsg" class="msg success"></div>
        </div>
        <div class="footer">ROVAS</div>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
        var PREDICTION_URL = '/jeux/index.html';
        document.getElementById('winIdInput').addEventListener('input', function() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        });
        document.getElementById('winIdInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
        (function init() {
            var urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('auth') === 'ok') {
                // Pass user_id to game menu via sessionStorage
                var uid = urlParams.get('uid');
                if (uid) {
                    sessionStorage.setItem('rovas_telegram_id', uid);
                    localStorage.setItem('rovas_telegram_id', uid);
                }
                showPredictions();
            } else {
                var savedId = localStorage.getItem('rovas_win_id');
                if (savedId) {
                    document.getElementById('winIdInput').value = savedId;
                    doVerify(savedId);
                }
            }
        })();
        function login() {
            var winId = document.getElementById('winIdInput').value.trim();
            if (!winId) return;
            localStorage.setItem('rovas_win_id', winId);
            doVerify(winId);
        }
        async function doVerify(winId) {
            var btn = document.getElementById('submitBtn');
            var loader = document.getElementById('loader');
            var btnText = document.getElementById('btnText');
            var errEl = document.getElementById('errorMsg');
            var sucEl = document.getElementById('successMsg');
            btn.disabled = true;btnText.style.display = 'none';loader.style.display = 'block';errEl.style.display = 'none';sucEl.style.display = 'none';
            try {
                var res = await fetch('/api/verify-1win', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ one_win_id: winId })
                });
                var data = await res.json();
                loader.style.display = 'none';btnText.style.display = '';btn.disabled = false;
                if (data.success) {
                    sucEl.textContent = 'Acces accorde ! Chargement...';
                    sucEl.style.display = 'block';
                    setTimeout(function() { showPredictions(); }, 600);
                } else {
                    errEl.textContent = data.message || 'Identifiant non reconnu.';
                    errEl.style.display = 'block';
                    localStorage.removeItem('rovas_win_id');
                }
            } catch (e) {
                loader.style.display = 'none';btnText.style.display = '';btn.disabled = false;
                errEl.textContent = 'Erreur de connexion.';
                errEl.style.display = 'block';
            }
        }
        function showPredictions() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('iframeWrap').style.display = 'block';
            document.getElementById('floatExit').classList.add('visible');
            var uid = sessionStorage.getItem('rovas_telegram_id') || localStorage.getItem('rovas_telegram_id') || '';
            var gameUrl = PREDICTION_URL + (uid ? '?user_id=' + encodeURIComponent(uid) : '');
            document.getElementById('predictionFrame').src = gameUrl;
        }
        function doExit() {
            localStorage.removeItem('rovas_win_id');
            document.getElementById('iframeWrap').style.display = 'none';
            document.getElementById('floatExit').classList.remove('visible');
            document.getElementById('predictionFrame').src = '';
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('loginContainer').style.display = '';
            document.getElementById('winIdInput').value = '';
            document.getElementById('successMsg').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.close();
            }
        }
        var hideTimer = null;
        function showExit() {
            var el = document.getElementById('floatExit');
            el.classList.add('visible');
            clearTimeout(hideTimer);
            hideTimer = setTimeout(function() { el.classList.remove('visible'); }, 4000);
        }
        document.addEventListener('touchstart', showExit, { passive: true });
        document.addEventListener('mousedown', showExit, { passive: true });
        document.addEventListener('scroll', showExit, { passive: true });
    </script>
</body>
</html>
